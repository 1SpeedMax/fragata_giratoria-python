{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Editar Pedido - La Fragata Giratoria</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- CSS Personalizado -->
    <link rel="stylesheet" href="{% static 'css/pedidos_editar.css' %}" />
</head>
<body>

<!-- NOTIFICACIONES CENTRALIZADAS -->
{% include 'layouts/notificaciones.html' %}

<div class="layout-container">
        
    <!-- SIDEBAR IZQUIERDO -->
    {% include 'layouts/sindear.html' %}

    <!-- CONTENIDO PRINCIPAL -->
    <main class="main-content">
        <div class="form-container">

            <!-- HEADER -->
            <div class="form-header">
                <h1><i class="fas fa-edit"></i> Editar Pedido #{{ pedido.id_pedido }}</h1>
                <p>Modifica los detalles del pedido</p>
            </div>

            <!-- FORMULARIO -->
            <div class="form-card">
                <form method="post" class="pedido-form" id="pedidoForm">
                    {% csrf_token %}

                    <input type="hidden" name="id_pedido" value="{{ pedido.id_pedido }}">

                    <div class="form-row">
                        <div class="form-group">
                            <label for="fecha">
                                <i class="fas fa-calendar"></i> Fecha del Pedido
                            </label>
                            <input type="date" id="fecha" name="fecha" value="{{ pedido.fecha|date:'Y-m-d' }}" required>
                        </div>
                        <div class="form-group">
                            <label for="cantidad">
                                <i class="fas fa-hashtag"></i> Cantidad
                            </label>
                            <input type="number" id="cantidad" name="cantidad" min="1" value="{{ pedido.cantidad }}" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="nombre_platillo">
                                <i class="fas fa-utensils"></i> Nombre del Platillo
                            </label>
                            <input type="text" id="nombre_platillo" name="nombre_platillo" value="{{ pedido.nombre_platillo }}" required>
                        </div>
                        <div class="form-group">
                            <label for="precio_unitario">
                                <i class="fas fa-tag"></i> Precio Unitario
                            </label>
                            <input type="number" id="precio_unitario" name="precio_unitario" step="0.01" min="0" value="{{ pedido.precio_unitario }}" required>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="subtotal">
                                <i class="fas fa-calculator"></i> Subtotal
                            </label>
                            <input type="number" id="subtotal" name="subtotal" step="0.01" value="{{ pedido.subtotal }}" readonly>
                        </div>
                        <div class="form-group">
                            <label for="total">
                                <i class="fas fa-dollar-sign"></i> Total
                            </label>
                            <input type="number" id="total" name="total" step="0.01" value="{{ pedido.total }}" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="estado">
                            <i class="fas fa-circle"></i> Estado del Pedido
                        </label>
                        <select id="estado" name="estado" required>
                            <option value="PENDIENTE" {% if pedido.estado == 'PENDIENTE' %}selected{% endif %}>Pendiente</option>
                            <option value="ENVIADO" {% if pedido.estado == 'ENVIADO' %}selected{% endif %}>Enviado</option>
                            <option value="ENTREGADO" {% if pedido.estado == 'ENTREGADO' %}selected{% endif %}>Entregado</option>
                            <option value="CANCELADO" {% if pedido.estado == 'CANCELADO' %}selected{% endif %}>Cancelado</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="observaciones">
                            <i class="fas fa-comment"></i> Observaciones
                        </label>
                        <textarea id="observaciones" name="observaciones" rows="3">{{ pedido.observaciones }}</textarea>
                    </div>

                    <h3 class="section-title"><i class="fas fa-link"></i> Información Adicional</h3>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="id_cliente">
                                <i class="fas fa-user"></i> Cliente
                            </label>
                            <select id="id_cliente" name="id_cliente">
                                <option value="" {% if not pedido.id_cliente %}selected{% endif %}>-- Seleccione un cliente (opcional) --</option>
                                {% for cliente in clientes %}
                                <option value="{{ cliente.id_cliente }}" {% if pedido.id_cliente.id == cliente.id_cliente %}selected{% endif %}>
                                    {{ cliente.nombre }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="id_usuario">
                                <i class="fas fa-user-tie"></i> Usuario (Vendedor)
                            </label>
                            <select id="id_usuario" name="id_usuario">
                                <option value="" {% if not pedido.id_usuario %}selected{% endif %}>-- Seleccione un usuario (opcional) --</option>
                                {% for usuario in usuarios %}
                                <option value="{{ usuario.id }}" {% if pedido.id_usuario.id == usuario.id %}selected{% endif %}>
                                    {{ usuario.nombre_usuario }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="id_metodo_pago">
                                <i class="fas fa-credit-card"></i> Método de Pago
                            </label>
                            <select id="id_metodo_pago" name="id_metodo_pago">
                                <option value="" {% if not pedido.id_metodo_pago %}selected{% endif %}>-- Seleccione un método (opcional) --</option>
                                {% for metodo in metodos_pago %}
                                <option value="{{ metodo.id_metodo_pago }}" {% if pedido.id_metodo_pago.id == metodo.id_metodo_pago %}selected{% endif %}>
                                    {{ metodo.nombre_metodo }}
                                </option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="id_adicional">
                                <i class="fas fa-plus"></i> ID Adicional
                            </label>
                            <input type="text" id="id_adicional" name="id_adicional" value="{{ pedido.id_adicional }}" placeholder="Referencia adicional (opcional)">
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button type="submit" class="btn-submit" id="btnSubmit">
                            <i class="fas fa-save"></i> Actualizar Pedido
                        </button>
                        <a href="{% url 'pedidos:lista' %}" class="btn-cancel">
                            <i class="fas fa-times"></i> Cancelar
                        </a>
                    </div>

                </form>
            </div>

            <!-- BOTÓN VOLVER -->
            <a href="{% url 'pedidos:lista' %}" class="back-link">
                <i class="fas fa-arrow-left"></i> Volver a Pedidos
            </a>

        </div>
    </main>

</div>

<!-- JavaScript Personalizado -->
<script src="{% static 'js/pedidos_editar.js' %}"></script>
<script>
    // Cálculo automático de subtotal para edición
    const cantidadInput = document.getElementById('cantidad');
    const precioInput = document.getElementById('precio_unitario');
    const subtotalInput = document.getElementById('subtotal');
    const totalInput = document.getElementById('total');

    function calcularSubtotal() {
        const cantidad = parseFloat(cantidadInput.value) || 0;
        const precio = parseFloat(precioInput.value) || 0;
        const subtotal = cantidad * precio;
        subtotalInput.value = subtotal.toFixed(2);
        totalInput.value = subtotal.toFixed(2);
    }

    cantidadInput.addEventListener('input', calcularSubtotal);
    precioInput.addEventListener('input', calcularSubtotal);
    
    // Inicializar
    calcularSubtotal();
</script>
</body>
</html>
